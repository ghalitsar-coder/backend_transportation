root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  # Nama binary hasil build
  bin = "./tmp/main.exe"
  # Command untuk build, arahkan ke main.go yang benar
  cmd = "go build -o ./tmp/main.exe ./cmd/server/main.go"
  delay = 1000
  # Folder yang diabaikan saat memonitor perubahan
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "frontend"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  # Ekstensi file yang dimonitor
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  # Kirim sinyal interrupt agar aplikasi shutdown dengan graceful
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  # Bersihkan folder tmp saat air berhenti
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
