name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # 1. Login ke Registry (Agar Buildx punya konteks auth)
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      # 2. Setup Buildx (Gunakan install: true agar driver otomatis tersetup dengan benar)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      # 3. Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Azure Login (Taruh di sini agar sesi login tidak terlalu lama menganggur saat build)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. Deploy
      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }}
          containerAppName: backend-container
          resourceGroup: rg-aca-sea
          targetPort: 8080
          environmentVariables: >-
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            AZURE_STORAGE_CONTAINER_NAME="blobacacontainer"
            AZURE_STORAGE_ACCOUNT_NAME="blobacaghal"
            TOMTOM_API_KEY="${{ secrets.TOMTOM_API_KEY }}"
            PORT="8080"